name: Deploy to Coolify

on:
  push:
    branches:
      - main

concurrency:
  group: coolify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Wait for CI and trigger Coolify
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: Wait for required workflows on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const requiredWorkflows = ['Run Django Tests', 'Build Front End'];

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 45; attempt += 1) {
              const response = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                event: 'push',
                per_page: 100,
              });

              const runs = response.data.workflow_runs;
              const latestByName = Object.fromEntries(
                requiredWorkflows.map((name) => {
                  const latest = runs
                    .filter((run) => run.name === name)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
                  return [name, latest || null];
                })
              );

              const missing = requiredWorkflows.filter((name) => !latestByName[name]);
              const pending = requiredWorkflows.filter((name) => {
                const run = latestByName[name];
                return run && run.status !== 'completed';
              });

              if (missing.length === 0 && pending.length === 0) {
                const failed = requiredWorkflows.filter((name) => latestByName[name].conclusion !== 'success');

                if (failed.length > 0) {
                  core.setFailed(`Required workflows failed for ${sha}: ${failed.join(', ')}`);
                  return;
                }

                core.info(`All required workflows succeeded for ${sha}.`);
                return;
              }

              core.info(
                `Waiting for required workflows (attempt ${attempt}/45). Missing: ${missing.join(', ') || 'none'}. ` +
                  `Pending: ${pending.join(', ') || 'none'}.`
              );

              await sleep(20000);
            }

            core.setFailed(`Timed out waiting for required workflows for ${sha}.`);

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/bluestemso/taylor_learns:latest
            ghcr.io/bluestemso/taylor_learns:${{ github.sha }}

      - name: Trigger Coolify deployment webhook
        env:
          COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing required secret: COOLIFY_DEPLOY_WEBHOOK_URL"
            exit 1
          fi

          if [ -z "$COOLIFY_API_TOKEN" ]; then
            echo "Missing required secret: COOLIFY_API_TOKEN"
            exit 1
          fi

          curl --fail --show-error --silent --request GET "$COOLIFY_DEPLOY_WEBHOOK_URL" \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN"
