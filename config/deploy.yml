service: taylor_learns

image: bluestemso/taylor_learns

env:
  # This is the minimal set of environment variables needed to run the app
  # in production. You can add more here and in the .kamal/secrets file as needed.
  clear:
    DJANGO_SETTINGS_MODULE: taylor_learns.settings_production
    ALLOWED_HOSTS: "taylorlearns.com"
    USE_S3_MEDIA: "True"
    AWS_STORAGE_BUCKET_NAME: "taylor-learns"
    AWS_S3_ENDPOINT_URL: "https://023f756e193f3f7fc0d9d6e443b2f8d5.r2.cloudflarestorage.com"
    AWS_S3_CUSTOM_DOMAIN: "media.taylorlearns.com"
    DEFAULT_FROM_EMAIL: "taylor@bluestem.solutions"
    SERVER_EMAIL: "noreply@taylorlearns.com"
    # uncomment and set to your preferred production email backend
    # EMAIL_BACKEND: "anymail.backends.mailgun.EmailBackend"
    CORS_ALLOWED_ORIGINS: "https://app.taylorlearns.com,https://taylorlearns.com"
    FRONTEND_ADDRESS: "https://taylorlearns.com"
    CSRF_COOKIE_DOMAIN: ".taylorlearns.com"
    SESSION_COOKIE_DOMAIN: ".taylorlearns.com"
  secret:
    - POSTGRES_PASSWORD
    - SECRET_KEY
    - DATABASE_URL
    - REDIS_URL
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - SENTRY_DSN
    - TURNSTILE_KEY
    - TURNSTILE_SECRET
    - ANTHROPIC_API_KEY
    - DEFAULT_AGENT_MODEL
    - DEFAULT_LLM_MODEL
    - OPENAI_API_KEY

# https://kamal-deploy.org/docs/configuration#using-different-roles-for-servers
servers:
  web:
    hosts:
      - <%= ENV.fetch("KAMAL_HOST") %>
    options:
      expose: "8000"
  celery:
    hosts:
      - <%= ENV.fetch("KAMAL_HOST") %>
    cmd: celery -A taylor_learns worker -l INFO --pool threads --concurrency 20
  celerybeat:
    hosts:
      - <%= ENV.fetch("KAMAL_HOST") %>
    cmd: celery -A taylor_learns beat -l INFO

# To use a non-root user see https://kamal-deploy.org/docs/configuration/ssh/#the-ssh-user
ssh:
  user: kamal

# See https://kamal-deploy.org/docs/configuration/builders/ for config options
builder:
  arch: arm64
  dockerfile: "Dockerfile.web"
  driver: docker

# See https://kamal-deploy.org/docs/configuration/docker-registry/ for config options
registry:
  server: ghcr.io
  username: bluestemso
  password:
    - KAMAL_REGISTRY_PASSWORD

accessories:
  # docker hostname will be "taylor_learns-postgres"
  postgres:
    image: postgres:17
    host: <%= ENV.fetch("KAMAL_HOST") %>
    directories:
      - data:/var/lib/postgresql/data
    env:
      clear:
        POSTGRES_USER: taylor_learns
        POSTGRES_DB: taylor_learns
      secret:
        - POSTGRES_PASSWORD
  ## docker hostname will be "taylor_learns-redis"
  redis:
    image: redis
    host: <%= ENV.fetch("KAMAL_HOST") %>

# See https://kamal-deploy.org/docs/configuration/proxy/ for config options
proxy:
  ssl: true
  host: taylorlearns.com
  app_port: 8000
