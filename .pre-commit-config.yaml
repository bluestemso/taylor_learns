exclude: ^static/.*|assets/.*|/migrations/.*|\.min\.js$|\.min\.css$|\.css\.map$|\.min\.js$|\.js\.map$|\.svg$
default_stages: [pre-commit]
default_language_version:
   python: python3.12

repos:
  - repo: local
    hooks:
      - id: template-class-guard
        name: Disallow responsive custom class variants
        entry: python3 -m scripts.check_template_classes
        language: system
        files: \.html$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.13.1
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
