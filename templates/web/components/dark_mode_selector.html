{% load i18n %}
<details class="relative" x-data="{}">
  <summary class="flex h-9 w-9 cursor-pointer list-none items-center justify-center border border-[var(--ei-border)] text-[var(--ei-text)]" @click.outside="$el.parentElement.removeAttribute('open')">
    <span class="sr-only">{% translate "Theme" %}</span>
    <svg aria-hidden="true" class="h-4 w-4 dark:hidden" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2V4" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M12 20V22" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M4 12H2" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M22 12H20" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M19.7782 4.22183L18.364 5.63604" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M5.63605 18.364L4.22183 19.7782" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M19.7782 19.7782L18.364 18.364" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <path d="M5.63605 5.63604L4.22183 4.22183" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"></path>
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"></circle>
    </svg>
    <svg aria-hidden="true" class="hidden h-4 w-4 dark:block" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 12.79C20.84 14.52 20.19 16.17 19.12 17.56C18.05 18.95 16.62 20.02 14.99 20.65C13.36 21.28 11.59 21.44 9.8778 21.11C8.16568 20.79 6.57402 20 5.28713 18.84C4.00024 17.68 3.06881 16.2 2.59947 14.56C2.13013 12.93 2.1415 11.2 2.63224 9.58C3.12298 7.95 4.07478 6.49 5.37623 5.35C6.67768 4.21 8.2798 3.44 10 3.14C9.01158 4.48 8.53529 6.12 8.65677 7.78C8.77825 9.44 9.48942 10.98 10.66 12.13C11.83 13.27 13.37 13.95 15.02 14.03C16.67 14.11 18.27 13.57 19.58 12.54C20.1 12.14 20.58 11.7 21 11.2V12.79Z" stroke="currentColor" stroke-linejoin="round" stroke-width="1.5"></path>
    </svg>
  </summary>
  <div class="absolute right-0 top-[42px] z-50 w-40 bg-[var(--ei-surface)] ei-border p-2">
    <button class="ei-mono w-full border-b border-[var(--ei-border)] px-2 py-2 text-left text-[11px] hover:text-[var(--ei-primary)]" type="button" onclick="localStorage.setItem('theme', '{{ light_theme|default:'light' }}'); syncDarkMode(); this.closest('details').removeAttribute('open');">
      {% translate "Light" %}
    </button>
    <button class="ei-mono w-full border-b border-[var(--ei-border)] px-2 py-2 text-left text-[11px] hover:text-[var(--ei-primary)]" type="button" onclick="localStorage.setItem('theme', '{{ dark_theme|default:'dark' }}'); syncDarkMode(); this.closest('details').removeAttribute('open');">
      {% translate "Dark" %}
    </button>
    <button class="ei-mono w-full px-2 py-2 text-left text-[11px] hover:text-[var(--ei-primary)]" type="button" onclick="localStorage.setItem('theme', 'system'); syncDarkMode(); this.closest('details').removeAttribute('open');">
      {% translate "System" %}
    </button>
  </div>
</details>
