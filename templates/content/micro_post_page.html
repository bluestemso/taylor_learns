{% extends "content/base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<article class="prose prose-sm mx-auto my-8">
    <h1>{{ page.title }}</h1>
    <div class="text-sm text-base-content/70 mb-2">{{ page.date }}</div>
    <div class="micro-post-body">
        {{ page.body }}
    </div>
    {% if page.tags.all %}
    <div class="flex flex-wrap gap-2 mt-4">
        {% for tag in page.tags.all %}
        <span class="badge badge-outline">{{ tag }}</span>
        {% endfor %}
    </div>
    {% endif %}
</article>
{% endblock %}
