{% extends "content/base.html" %}
{% load i18n %}
{% load wagtailcore_tags %}

{% block content %}
<article class="mx-auto max-w-4xl ei-border bg-[var(--ei-surface)]">
  <header class="ei-border-b px-6 py-6 md:px-8">
    <h1 class="ei-display text-3xl font-bold">{{ page.title }}</h1>
    <p class="ei-mono mt-2 text-[11px] text-[var(--ei-muted)]">{{ page.date|date:"Y.m.d" }}</p>
  </header>
  <div class="px-6 py-8 md:px-8">
    <div class="ei-reading text-2xl italic leading-[1.45]">{% include_block page.body %}</div>
    {% if page.tags.all %}
    <div class="mt-8 flex flex-wrap gap-2">
      {% for tag in page.tags.all %}
      <span class="ei-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</article>
{% endblock %}
